name: Deploy (KingHost SFTP)

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-kinghost
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build CSS (Tailwind)
        run: |
          npm ci
          npm run build-css

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install PHP dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Test SFTP connection
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.DEPLOY_PASS }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          echo "DNS:"
          getent hosts "$DEPLOY_HOST" || true
          echo "Port check:"
          timeout 5 bash -lc "cat < /dev/null > /dev/tcp/$DEPLOY_HOST/$DEPLOY_PORT" && echo "Port $DEPLOY_PORT ok"
          sudo apt-get update -y
          sudo apt-get install -y sshpass
          sshpass -p "$DEPLOY_PASS" ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "echo CONNECTED"

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: |
            *
            !.github
            !node_modules
            !src
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true
          debug: true
